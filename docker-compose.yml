services:

  frontend:
    build:
      context: ./frontend
    container_name: frontend

    restart: always

    networks:
      - app-network

    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build:
      context: ./backend

    container_name: backend

    env_file:
      - .env

    restart: always

    depends_on:
      db:
        condition: service_healthy

    networks:
      - app-network

    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: mysql:8.4

    container_name: mysql-db

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}

    volumes:
      - db_data:/var/lib/mysql

    networks:
      - app-network

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 5

  nginx:
    image: nginx:1.27-alpine

    container_name: nginx-proxy

    restart: always

    ports:
      - "80:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

    depends_on:
      - frontend
      - backend

    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db_data:
